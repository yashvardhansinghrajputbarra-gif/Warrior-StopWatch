<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Focus Engine</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%230071e3%22 opacity=%220.15%22/><circle cx=%2250%22 cy=%2250%22 r=%2232%22 fill=%22none%22 stroke=%22%230071e3%22 stroke-width=%224.5%22/><circle cx=%2250%22 cy=%2250%22 r=%2214%22 fill=%22%232ed573%22/></svg>">
    <style>
        :root {
            --bg-color: #0b0d12;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.07);
            --text-main: #e6e8ec;
            --text-dim: rgba(255, 255, 255, 0.45);
            --accent-green: #2ed573;
            --accent-blue: #0071e3;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            padding: clamp(16px, 4vw, 40px);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
            position: relative;
        }

        /* Subtle Soft Ripple starting behind the card */
        .ripple-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 2px;
            height: 2px;
            background: transparent;
            border: 1px solid rgba(46, 213, 115, 0.25);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
            opacity: 0;
            transform: translate(-50%, -50%) scale(0);
        }

        body.running-mode .ripple-overlay {
            animation: softMinimalRipple 6s infinite cubic-bezier(0.25, 1, 0.5, 1);
        }

        @keyframes softMinimalRipple {
            0% {
                width: 2px;
                height: 2px;
                transform: translate(-50%, -50%) scale(1);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            100% {
                width: 280vmax;
                height: 280vmax;
                transform: translate(-50%, -50%) scale(1);
                opacity: 0;
            }
        }

        .header-container {
            width: 100%;
            max-width: 1100px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
            z-index: 10;
        }

        h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: var(--text-main);
            opacity: 0.9;
        }

        .timeline-badge {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 8px 18px;
            border-radius: 99px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .timeline-badge span.dot {
            color: rgba(255, 255, 255, 0.2);
            font-size: 8px;
        }

        .main-engine-container {
            width: 100%;
            max-width: 800px;
            margin: auto 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            z-index: 5;
        }

        /* Pure Minimal Glass Card */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: clamp(36px, 6vw, 56px) clamp(24px, 5vw, 48px);
            width: 100%;
            transition: border-color 0.4s ease;
        }

        /* Minimal Status Indicator Pill */
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 5px 14px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            margin-bottom: 24px;
            transition: all 0.4s ease;
        }

        .status-beacon {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-dim);
            transition: all 0.4s ease;
        }

        body.running-mode .status-pill {
            background: rgba(46, 213, 115, 0.08);
            border-color: rgba(46, 213, 115, 0.2);
            color: var(--accent-green);
        }

        body.running-mode .status-beacon {
            background: var(--accent-green);
        }

        .chrono-display {
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
            font-size: var(--stopwatch-scale, clamp(48px, 9vw, 80px));
            font-weight: 600;
            letter-spacing: -1.5px;
            color: var(--text-main);
            margin: 0 0 32px 0;
            line-height: 1;
            transition: font-size 0.15s ease-out;
        }

        .controls-cluster {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
        }

        .action-row {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        button {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
            border-radius: 99px;
            padding: 14px 28px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.2px;
            transition: all 0.2s ease;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        button:active { transform: scale(0.98); }

        button.run-active {
            background: var(--accent-blue);
            border-color: transparent;
            color: #ffffff;
        }
        button.run-active:hover {
            opacity: 0.9;
        }

        button.halt-active {
            background: rgba(255, 59, 48, 0.12);
            border-color: rgba(255, 59, 48, 0.25);
            color: #ff453a;
        }
        button.halt-active:hover {
            background: rgba(255, 59, 48, 0.18);
        }

        button.reset-engine-btn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-size: 12px;
            font-weight: 500;
            padding: 6px 16px;
            width: auto;
        }
        button.reset-engine-btn:hover {
            color: #ff453a;
            background: transparent;
        }

        /* Minimal Scale Slider Pill */
        .scale-control-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 8px 18px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 99px;
            opacity: 0.5;
            transition: opacity 0.3s ease;
            margin-top: 20px;
            z-index: 10;
        }
        .scale-control-wrapper:hover {
            opacity: 1;
        }

        .scale-icon {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dim);
            user-select: none;
        }

        input[type="range"].scale-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 120px;
            height: 3px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 99px;
            outline: none;
            cursor: pointer;
        }

        input[type="range"].scale-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--text-main);
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .header-container {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

<div class="ripple-overlay"></div>

<div class="header-container">
    <h1>Zen Focus Engine</h1>
    <div class="timeline-badge" id="timelineBadge">
        <span id="badgeDay">Day 0</span>
        <span class="dot">•</span>
        <span id="badgeRemaining">0 Days Left</span>
        <span class="dot">•</span>
        <span id="badgeDate">---</span>
    </div>
</div>

<div class="main-engine-container">
    <div class="glass-card">
        <div class="status-pill" id="statusPill">
            <span class="status-beacon"></span>
            <span id="statusText">IDLE • READY</span>
        </div>

        <div class="chrono-display" id="chronoDisplay">00:00:00</div>
        
        <div class="controls-cluster">
            <div class="action-row">
                <button id="toggleBtn" class="run-active">▶ Start Session</button>
            </div>
            <button id="resetEngineBtn" class="reset-engine-btn">🔄 Reset Today's Session</button>
        </div>
    </div>
</div>

<div class="scale-control-wrapper" title="Adjust display size">
    <span class="scale-icon">A</span>
    <input type="range" id="scaleSlider" class="scale-slider" min="48" max="140" value="76">
    <span class="scale-icon" style="font-size: 14px;">A</span>
</div>

<script>
    const DEFAULT_SCALE = 76;
    const START_DATE = new Date(2026, 2, 14, 0, 1, 0); 
    const TARGET_DATE = new Date(2027, 4, 2, 0, 1, 0);  

    let rawSavedState = localStorage.getItem("zen_chrono_state") || localStorage.getItem("warrior_chrono_state") || "{}";
    let state = JSON.parse(rawSavedState);

    let mainLoopInterval = null;

    function initFallbackState() {
        if (state.accumulatedTime === undefined) state.accumulatedTime = 0;
        if (state.engineActive === undefined) state.engineActive = false;
        if (state.sessionStartTime === undefined) state.sessionStartTime = 0;
        if (state.lastRolloverTimestamp === undefined) state.lastRolloverTimestamp = Date.now();
    }
    initFallbackState();

    document.addEventListener("DOMContentLoaded", () => {
        const chronoDisplay = document.getElementById("chronoDisplay");
        const toggleBtn = document.getElementById("toggleBtn");
        const resetEngineBtn = document.getElementById("resetEngineBtn");
        const scaleSlider = document.getElementById("scaleSlider");
        const statusText = document.getElementById("statusText");
        
        const badgeDay = document.getElementById("badgeDay");
        const badgeRemaining = document.getElementById("badgeRemaining");
        const badgeDate = document.getElementById("badgeDate");

        function saveState() {
            localStorage.setItem("zen_chrono_state", JSON.stringify(state));
            localStorage.setItem("warrior_chrono_state", JSON.stringify(state));
        }

        function formatTimeMatrix(ticks) {
            let hours = Math.floor(ticks / 3600000);
            let minutes = Math.floor((ticks % 3600000) / 60000);
            let seconds = Math.floor((ticks % 60000) / 1000);
            return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function computeCurrentSessionDuration() {
            if (!state.engineActive) return state.accumulatedTime;
            return state.accumulatedTime + (Date.now() - state.sessionStartTime);
        }

        function getTrackerTimelineMetrics() {
            let now = new Date();
            let targetNow = new Date(now.getTime());
            targetNow.setHours(0, 1, 0, 0);

            let currentDayNum = Math.floor((targetNow.getTime() - START_DATE.getTime()) / (1000 * 60 * 60 * 24)) + 1;
            let daysRemaining = Math.ceil((TARGET_DATE.getTime() - targetNow.getTime()) / (1000 * 60 * 60 * 24));
            if (daysRemaining < 0) daysRemaining = 0;

            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            return { currentDayNum, daysRemaining, dateStr: `${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}` };
        }

        function applyDisplaySize(size) {
            document.documentElement.style.setProperty('--stopwatch-scale', `${size}px`);
            scaleSlider.value = size;
        }

        function updateUIDisplay() {
            let totalTimeMs = computeCurrentSessionDuration();
            chronoDisplay.textContent = formatTimeMatrix(totalTimeMs);

            let timeline = getTrackerTimelineMetrics();
            badgeDay.textContent = `Day ${timeline.currentDayNum}`;
            badgeRemaining.textContent = `${timeline.daysRemaining} Days Left`;
            badgeDate.textContent = timeline.dateStr;

            if (state.engineActive) {
                document.body.classList.add("running-mode");
                statusText.textContent = "DEEP FOCUS ACTIVE";
            } else {
                document.body.classList.remove("running-mode");
                statusText.textContent = "IDLE • READY";
            }
        }

        function evaluateTemporalRollover() {
            let now = new Date();
            let lastRollover = new Date(state.lastRolloverTimestamp);
            
            let boundary = new Date(lastRollover.getFullYear(), lastRollover.getMonth(), lastRollover.getDate(), 0, 1, 0, 0);
            let currentBoundary = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 1, 0, 0);

            if (currentBoundary.getTime() > boundary.getTime()) {
                state.accumulatedTime = 0;
                state.sessionStartTime = Date.now();
                state.lastRolloverTimestamp = Date.now();
                saveState();
                updateUIDisplay();
            }
        }

        function toggleSession() {
            evaluateTemporalRollover();
            if (!state.engineActive) {
                state.sessionStartTime = Date.now();
                state.engineActive = true;
                toggleBtn.textContent = "⏸ Stop Block";
                toggleBtn.className = "halt-active";
                mainLoopInterval = setInterval(() => { evaluateTemporalRollover(); updateUIDisplay(); }, 250);
            } else {
                state.accumulatedTime += (Date.now() - state.sessionStartTime);
                state.engineActive = false;
                toggleBtn.textContent = "▶ Start Session";
                toggleBtn.className = "run-active";
                clearInterval(mainLoopInterval);
            }
            saveState();
            updateUIDisplay();
        }

        toggleBtn.addEventListener("click", toggleSession);

        window.addEventListener("keydown", (e) => {
            if (e.key === "F1") { e.preventDefault(); toggleSession(); }
            if (e.key === " " || e.code === "Space") {
                const activeTag = document.activeElement ? document.activeElement.tagName.toLowerCase() : "";
                if (activeTag !== "input" && activeTag !== "textarea" && activeTag !== "button") { e.preventDefault(); toggleSession(); }
            }
        });

        resetEngineBtn.addEventListener("click", () => {
            if (confirm("Are you sure you want to reset today's focus time?")) {
                state.accumulatedTime = 0; 
                state.engineActive = false; 
                state.sessionStartTime = 0; 
                clearInterval(mainLoopInterval);
                toggleBtn.textContent = "▶ Start Session"; 
                toggleBtn.className = "run-active";
                saveState(); 
                updateUIDisplay();
            }
        });

        scaleSlider.addEventListener("input", (e) => {
            applyDisplaySize(e.target.value);
        });

        applyDisplaySize(DEFAULT_SCALE);
        evaluateTemporalRollover();
        updateUIDisplay();

        if (state.engineActive) {
            toggleBtn.textContent = "⏸ Stop Block"; 
            toggleBtn.className = "halt-active";
            mainLoopInterval = setInterval(() => { evaluateTemporalRollover(); updateUIDisplay(); }, 250);
        }
    });
</script>
</body>
</html>
