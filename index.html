<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Focus Engine</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%230071e3%22 opacity=%220.15%22/><circle cx=%2250%22 cy=%2250%22 r=%2232%22 fill=%22none%22 stroke=%22%230071e3%22 stroke-width=%224.5%22/><circle cx=%2250%22 cy=%2250%22 r=%2214%22 fill=%22%2334c759%22/></svg>">
    <style>
        :root {
            --glass-bg: rgba(18, 24, 38, 0.72);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.55);
            --accent-blue: #0071e3;
            --accent-green: #34c759;
            --accent-red: #ff3b30;
            --glow-color: rgba(52, 199, 89, 0.22);
            --aura-color: rgba(0, 113, 227, 0.25);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #07090e;
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            padding: clamp(16px, 4vw, 40px);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Dynamic Background Aura */
        body::before {
            content: "";
            position: fixed;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: 
                radial-gradient(circle at 50% 45%, var(--aura-color) 0%, transparent 55%),
                radial-gradient(circle at 80% 20%, rgba(10, 132, 255, 0.12) 0%, transparent 45%),
                radial-gradient(circle at 20% 80%, rgba(48, 209, 88, 0.08) 0%, transparent 50%);
            z-index: -2;
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body.running-mode::before {
            --aura-color: rgba(52, 199, 89, 0.28);
        }

        .header-container {
            width: 100%;
            max-width: 1100px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
            background: linear-gradient(180deg, #ffffff 0%, rgba(255,255,255,0.75) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .timeline-badge {
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            border: 1px solid var(--glass-border);
            padding: 8px 20px;
            border-radius: 99px;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.35);
        }

        .timeline-badge span.dot {
            color: rgba(255, 255, 255, 0.3);
            font-size: 8px;
        }

        .main-engine-container {
            width: 100%;
            max-width: 850px;
            margin: auto 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }

        /* Glass Card with Dynamic Breathing Edge */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            border: 1px solid var(--glass-border);
            border-radius: 36px;
            padding: clamp(36px, 6vw, 64px) clamp(24px, 5vw, 56px);
            width: 100%;
            box-shadow: 
                0 10px 30px -5px rgba(0, 0, 0, 0.5),
                0 30px 70px -10px rgba(0, 0, 0, 0.6),
                inset 0 1px 0px rgba(255, 255, 255, 0.15);
            transition: all 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        /* Subtle Top Glow Line */
        .glass-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 10%;
            right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.35), transparent);
        }

        /* Status Indicator Pill */
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-dim);
            margin-bottom: 20px;
            transition: all 0.4s ease;
        }

        .status-beacon {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-dim);
            transition: all 0.4s ease;
        }

        body.running-mode .status-pill {
            background: rgba(52, 199, 89, 0.12);
            border-color: rgba(52, 199, 89, 0.3);
            color: #30d158;
            box-shadow: 0 0 15px rgba(52, 199, 89, 0.15);
        }

        body.running-mode .status-beacon {
            background: #30d158;
            box-shadow: 0 0 8px #30d158;
            animation: pulse-beacon 1.8s infinite;
        }

        @keyframes pulse-beacon {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.3); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }

        .chrono-display {
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
            font-size: var(--stopwatch-scale, clamp(52px, 10vw, 88px));
            font-weight: 700;
            letter-spacing: -2px;
            color: var(--text-main);
            margin: 0 0 32px 0;
            text-shadow: 0 4px 25px rgba(0, 0, 0, 0.7);
            transition: font-size 0.15s ease-out, text-shadow 0.4s ease;
            line-height: 1;
        }

        body.running-mode .chrono-display {
            text-shadow: 0 0 30px rgba(52, 199, 89, 0.25), 0 4px 25px rgba(0, 0, 0, 0.7);
        }

        .controls-cluster {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 340px;
            margin: 0 auto;
        }

        .action-row {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        button {
            width: 100%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0.05) 100%);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 99px;
            padding: 16px 32px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.2px;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.45);
        }

        button:active { transform: scale(0.97); }

        button.run-active {
            background: linear-gradient(180deg, #0077ff 0%, #005bb5 100%);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 6px 25px rgba(0, 113, 227, 0.4);
        }
        button.run-active:hover {
            box-shadow: 0 8px 30px rgba(0, 113, 227, 0.6);
        }

        button.halt-active {
            background: linear-gradient(180deg, rgba(255, 59, 48, 0.25) 0%, rgba(255, 59, 48, 0.12) 100%);
            border-color: rgba(255, 59, 48, 0.4);
            color: #ff453a;
            box-shadow: 0 6px 25px rgba(255, 59, 48, 0.25);
        }
        button.halt-active:hover {
            background: linear-gradient(180deg, rgba(255, 59, 48, 0.35) 0%, rgba(255, 59, 48, 0.2) 100%);
        }

        button.reset-engine-btn {
            background: transparent;
            border: 1px dashed rgba(255, 255, 255, 0.16);
            color: var(--text-dim);
            font-size: 12px;
            font-weight: 600;
            padding: 8px 22px;
            border-radius: 99px;
            box-shadow: none;
            width: auto;
        }
        button.reset-engine-btn:hover {
            background: rgba(255, 59, 48, 0.1);
            border-color: rgba(255, 59, 48, 0.4);
            color: #ff453a;
            transform: none;
        }

        /* Floating Bottom Scale Slider Pill */
        .scale-control-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 10px 22px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 99px;
            backdrop-filter: blur(25px) saturate(150%);
            -webkit-backdrop-filter: blur(25px) saturate(150%);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            opacity: 0.6;
            transition: all 0.3s ease;
            margin-top: 20px;
        }
        .scale-control-wrapper:hover {
            opacity: 1;
            transform: translateY(-1px);
        }

        .scale-icon {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-dim);
            user-select: none;
        }

        input[type="range"].scale-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 140px;
            height: 4px;
            background: rgba(255, 255, 255, 0.18);
            border-radius: 99px;
            outline: none;
            cursor: pointer;
        }

        input[type="range"].scale-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--text-main);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.6);
            transition: transform 0.1s ease;
        }

        input[type="range"].scale-slider::-webkit-slider-thumb:hover {
            transform: scale(1.25);
        }

        @media (max-width: 600px) {
            .header-container {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

<div class="header-container">
    <h1>Zen Focus Engine</h1>
    <div class="timeline-badge" id="timelineBadge">
        <span id="badgeDay">Day 0</span>
        <span class="dot">•</span>
        <span id="badgeRemaining">0 Days Left</span>
        <span class="dot">•</span>
        <span id="badgeDate">---</span>
    </div>
</div>

<div class="main-engine-container">
    <div class="glass-card">
        <div class="status-pill" id="statusPill">
            <span class="status-beacon"></span>
            <span id="statusText">IDLE • READY</span>
        </div>

        <div class="chrono-display" id="chronoDisplay">00:00:00</div>
        
        <div class="controls-cluster">
            <div class="action-row">
                <button id="toggleBtn" class="run-active">▶ Start Session</button>
            </div>
            <button id="resetEngineBtn" class="reset-engine-btn">🔄 Reset Today's Session</button>
        </div>
    </div>
</div>

<div class="scale-control-wrapper" title="Adjust display size for viewing from afar">
    <span class="scale-icon">A</span>
    <input type="range" id="scaleSlider" class="scale-slider" min="48" max="140" value="76">
    <span class="scale-icon" style="font-size: 15px;">A</span>
</div>

<script>
    const DEFAULT_SCALE = 76;
    const START_DATE = new Date(2026, 2, 14, 0, 1, 0); 
    const TARGET_DATE = new Date(2027, 4, 2, 0, 1, 0);  

    let rawSavedState = localStorage.getItem("zen_chrono_state") || localStorage.getItem("warrior_chrono_state") || "{}";
    let state = JSON.parse(rawSavedState);

    let mainLoopInterval = null;

    function initFallbackState() {
        if (state.accumulatedTime === undefined) state.accumulatedTime = 0;
        if (state.engineActive === undefined) state.engineActive = false;
        if (state.sessionStartTime === undefined) state.sessionStartTime = 0;
        if (state.lastRolloverTimestamp === undefined) state.lastRolloverTimestamp = Date.now();
    }
    initFallbackState();

    document.addEventListener("DOMContentLoaded", () => {
        const chronoDisplay = document.getElementById("chronoDisplay");
        const toggleBtn = document.getElementById("toggleBtn");
        const resetEngineBtn = document.getElementById("resetEngineBtn");
        const scaleSlider = document.getElementById("scaleSlider");
        const statusText = document.getElementById("statusText");
        
        const badgeDay = document.getElementById("badgeDay");
        const badgeRemaining = document.getElementById("badgeRemaining");
        const badgeDate = document.getElementById("badgeDate");

        function saveState() {
            localStorage.setItem("zen_chrono_state", JSON.stringify(state));
            localStorage.setItem("warrior_chrono_state", JSON.stringify(state));
        }

        function formatTimeMatrix(ticks) {
            let hours = Math.floor(ticks / 3600000);
            let minutes = Math.floor((ticks % 3600000) / 60000);
            let seconds = Math.floor((ticks % 60000) / 1000);
            return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function computeCurrentSessionDuration() {
            if (!state.engineActive) return state.accumulatedTime;
            return state.accumulatedTime + (Date.now() - state.sessionStartTime);
        }

        function getTrackerTimelineMetrics() {
            let now = new Date();
            let targetNow = new Date(now.getTime());
            targetNow.setHours(0, 1, 0, 0);

            let currentDayNum = Math.floor((targetNow.getTime() - START_DATE.getTime()) / (1000 * 60 * 60 * 24)) + 1;
            let daysRemaining = Math.ceil((TARGET_DATE.getTime() - targetNow.getTime()) / (1000 * 60 * 60 * 24));
            if (daysRemaining < 0) daysRemaining = 0;

            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            return { currentDayNum, daysRemaining, dateStr: `${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}` };
        }

        function applyDisplaySize(size) {
            document.documentElement.style.setProperty('--stopwatch-scale', `${size}px`);
            scaleSlider.value = size;
        }

        function updateUIDisplay() {
            let totalTimeMs = computeCurrentSessionDuration();
            chronoDisplay.textContent = formatTimeMatrix(totalTimeMs);

            let timeline = getTrackerTimelineMetrics();
            badgeDay.textContent = `Day ${timeline.currentDayNum}`;
            badgeRemaining.textContent = `${timeline.daysRemaining} Days Left`;
            badgeDate.textContent = timeline.dateStr;

            if (state.engineActive) {
                document.body.classList.add("running-mode");
                statusText.textContent = "DEEP FOCUS ACTIVE";
            } else {
                document.body.classList.remove("running-mode");
                statusText.textContent = "IDLE • READY";
            }
        }

        function evaluateTemporalRollover() {
            let now = new Date();
            let lastRollover = new Date(state.lastRolloverTimestamp);
            
            let boundary = new Date(lastRollover.getFullYear(), lastRollover.getMonth(), lastRollover.getDate(), 0, 1, 0, 0);
            let currentBoundary = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 1, 0, 0);

            if (currentBoundary.getTime() > boundary.getTime()) {
                state.accumulatedTime = 0;
                state.sessionStartTime = Date.now();
                state.lastRolloverTimestamp = Date.now();
                saveState();
                updateUIDisplay();
            }
        }

        function toggleSession() {
            evaluateTemporalRollover();
            if (!state.engineActive) {
                state.sessionStartTime = Date.now();
                state.engineActive = true;
                toggleBtn.textContent = "⏸ Stop Block";
                toggleBtn.className = "halt-active";
                mainLoopInterval = setInterval(() => { evaluateTemporalRollover(); updateUIDisplay(); }, 250);
            } else {
                state.accumulatedTime += (Date.now() - state.sessionStartTime);
                state.engineActive = false;
                toggleBtn.textContent = "▶ Start Session";
                toggleBtn.className = "run-active";
                clearInterval(mainLoopInterval);
            }
            saveState();
            updateUIDisplay();
        }

        toggleBtn.addEventListener("click", toggleSession);

        window.addEventListener("keydown", (e) => {
            if (e.key === "F1") { e.preventDefault(); toggleSession(); }
            if (e.key === " " || e.code === "Space") {
                const activeTag = document.activeElement ? document.activeElement.tagName.toLowerCase() : "";
                if (activeTag !== "input" && activeTag !== "textarea" && activeTag !== "button") { e.preventDefault(); toggleSession(); }
            }
        });

        resetEngineBtn.addEventListener("click", () => {
            if (confirm("Are you sure you want to reset today's focus time?")) {
                state.accumulatedTime = 0; 
                state.engineActive = false; 
                state.sessionStartTime = 0; 
                clearInterval(mainLoopInterval);
                toggleBtn.textContent = "▶ Start Session"; 
                toggleBtn.className = "run-active";
                saveState(); 
                updateUIDisplay();
            }
        });

        scaleSlider.addEventListener("input", (e) => {
            applyDisplaySize(e.target.value);
        });

        // Always reset scale to DEFAULT_SCALE on fresh page load/refresh
        applyDisplaySize(DEFAULT_SCALE);
        evaluateTemporalRollover();
        updateUIDisplay();

        if (state.engineActive) {
            toggleBtn.textContent = "⏸ Stop Block"; 
            toggleBtn.className = "halt-active";
            mainLoopInterval = setInterval(() => { evaluateTemporalRollover(); updateUIDisplay(); }, 250);
        }
    });
</script>
</body>
</html>
